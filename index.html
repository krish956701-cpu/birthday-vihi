<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vihi 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    scroll-behavior: smooth;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: white;
    text-align: center;
    overflow-x: hidden;
    transition: 0.5s;
}

/* DARK MODE */
.dark {
    background: #111;
    color: #fff;
}

/* Navbar */
nav {
    position: fixed;
    width: 100%;
    background: rgba(0,0,0,0.5);
    padding: 10px;
}
nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

/* Sections */
section {
    height: 100vh;
    padding-top: 80px;
}

/* Button */
button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #ff4b5c;
    color: white;
    cursor: pointer;
}

/* Slideshow */
.slideshow {
    width: 260px;
    height: 320px;
    margin: auto;
    border-radius: 20px;
    overflow: hidden;
}
.slideshow img {
    width: 100%;
    height: 100%;
    display: none;
}
.active { display: block; }

/* Hearts */
.heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}
@keyframes floatUp {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}
</style>

</head>

<body onload="autoPlay()">

<nav>
<a href="#home">Home</a>
<a href="#gallery">Gallery</a>
<a href="#letter">Letter</a>
<a href="#surprise">Surprise</a>
<a href="#final">Final</a>

<button onclick="toggleDark()">🌙</button>
</nav>

<!-- HOME -->
<section id="home">
<h1>🎉 Happy Birthday Vihi 🎉</h1>
<p id="typing"></p>

<audio id="music" src="music.mp3"></audio>
</section>

<!-- GALLERY -->
<section id="gallery">
<h1>📸 Memories of Vihi</h1>

<div class="slideshow">
<img src="photo1.jpg" class="slide active">
<img src="photo2.jpg" class="slide">
<img src="photo3.jpg" class="slide">
</div>
</section>

<!-- LETTER -->
<section id="letter">
<h1>💌 A Letter</h1>
<p>
Dear Vihi ❤️<br><br>
You are my happiness 💖<br>
— Krish
</p>
</section>

<!-- SURPRISE -->
<section id="surprise">
<h1>🎁 Surprise</h1>

<button onclick="ultimateSurprise()">Click Me 💖</button>

<p id="msg" style="display:none;">
💖 Vihi, you are my forever best friend 💖
</p>
</section>

<!-- FINAL -->
<section id="final">
<h1>🎊 Happy Birthday Vihi 🎊</h1>
<p>— From Krish 💖</p>
</section>

<script>
// AUTO MUSIC
function autoPlay(){
    let music = document.getElementById("music");
    music.play().catch(()=>{});
}

// TYPING EFFECT
let text = "You are the most special person in my life ❤️ — Krish";
let i = 0;
function typing(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing,50);
    }
}
typing();

// DARK MODE
function toggleDark(){
    document.body.classList.toggle("dark");
}

// SLIDESHOW
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(()=>{
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
},2000);

// HEARTS
setInterval(()=>{
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    document.body.appendChild(heart);

    setTimeout(()=> heart.remove(),5000);
},300);

// CONFETTI
function ultimateSurprise(){
    document.getElementById("msg").style.display="block";

    for(let i=0;i<80;i++){
        let c = document.createElement("div");
        c.style.position="fixed";
        c.style.width="10px";
        c.style.height="10px";
        c.style.background="yellow";
        c.style.top="0";
        c.style.left=Math.random()*100+"vw";

        document.body.appendChild(c);

        let fall = setInterval(()=>{
            c.style.top = (parseInt(c.style.top)+5)+"px";
        },30);

        setTimeout(()=>{
            clearInterval(fall);
            c.remove();
        },2000);
    }
}
</script>

</body>
</html>
